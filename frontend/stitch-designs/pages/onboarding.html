<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BusinessMiner - 智能挖掘</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00E5BF",
                        "background-dark": "#0A1929",
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .forge-glow {
            filter: drop-shadow(0 0 20px rgba(0, 229, 191, 0.5));
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pulsing-glow {
            box-shadow: 0 0 15px rgba(0, 229, 191, 0.3);
        }
    </style>
<style>
        body {
            min-height: max(844px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col font-display overflow-hidden relative">
<div class="flex items-center justify-between p-6 pt-12 relative z-10">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark font-bold text-xl">bolt</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-white">BusinessMiner</h2>
</div>
<button class="text-sm font-medium text-slate-400 hover:text-primary transition-colors">跳过</button>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 relative z-10">
<div class="relative w-full aspect-square max-w-[300px] mb-10 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-[80px]"></div>
<div class="relative w-64 h-64 rounded-full border-2 border-primary/20 flex items-center justify-center">
<div class="w-44 h-44 rounded-full border border-primary/30 flex items-center justify-center">

<div class="absolute -top-1 -right-1 w-3 h-3 bg-primary rounded-full pulsing-glow"></div>
</div>
</div>
<div class="absolute top-8 right-6 w-2 h-2 bg-primary/40 rounded-full"></div>
<div class="absolute bottom-10 left-4 w-3 h-3 bg-primary/60 rounded-full"></div>
</div>
</div>
<div class="w-full glass-card rounded-3xl p-8 mb-8 text-center border-t border-white/10">
<h1 class="text-3xl font-bold mb-4 tracking-tight text-white">智能挖掘</h1>
<p class="text-slate-400 leading-relaxed text-base">
                从 Reddit 海量讨论中<br/>自动识别市场痛点
            </p>
</div>
<div class="flex items-center justify-center gap-2.5 mb-8">
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(0,229,191,0.5)]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
</div>
</div>
<div class="px-6 pb-16 flex flex-col gap-4 relative z-10">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] text-lg">
            立即开始
        </button>
</div>
<div class="fixed top-[-5%] right-[-10%] w-[300px] h-[300px] bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[15%] left-[-20%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
