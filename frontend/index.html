<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaForge - Reddit 商机发现平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.95em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .findings-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .finding-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #764ba2;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .finding-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .finding-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .finding-desc {
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        
        .button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .button.secondary {
            background: #999;
            margin-left: 10px;
        }
        
        .button.secondary:hover {
            background: #777;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #667eea;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }
        
        .chat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: 20px;
        }
        
        .message.assistant {
            background: #e8e8e8;
            color: #333;
            margin-right: 20px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        
        .status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .status.new {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.researching {
            background: #cfe2ff;
            color: #084298;
        }
        
        .status.completed {
            background: #d1e7dd;
            color: #0f5132;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .modal-content {
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 IdeaForge</h1>
            <p class="subtitle">从 Reddit 自动发现商机和用户痛点</p>
        </header>
        
        <div class="main-content">
            <!-- 统计卡片 -->
            <div class="card">
                <h2>📊 统计信息</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">总商机数</div>
                        <div class="stat-value" id="totalFindings">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">新发现</div>
                        <div class="stat-value" id="newFindings">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">研究中</div>
                        <div class="stat-value" id="researchingFindings">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">已完成</div>
                        <div class="stat-value" id="completedFindings">0</div>
                    </div>
                </div>
                <button class="button" onclick="loadFindings()" style="margin-top: 15px; width: 100%;">
                    刷新数据
                </button>
            </div>
            
            <!-- 最近发现 -->
            <div class="card">
                <h2>🔍 最近商机发现</h2>
                <div class="findings-list" id="findingsList">
                    <p style="color: #999; text-align: center; padding: 20px;">加载中...</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>⚡ 快速操作</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <button class="button" onclick="showModal('crawlModal')">
                    🕷️ 立即爬取
                </button>
                <button class="button" onclick="showModal('analyzeModal')">
                    🤖 AI 分析
                </button>
                <button class="button" onclick="viewApiDocs()">
                    📚 API 文档
                </button>
            </div>
        </div>
        
        <div class="footer">
            <p>✨ IdeaForge v0.1.0 | <a href="/docs" style="color: white; text-decoration: underline;">API Swagger 文档</a></p>
        </div>
    </div>
    
    <!-- 爬取模态框 -->
    <div class="modal" id="crawlModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🕷️ Reddit 爬取设置</h2>
                <button class="close-btn" onclick="hideModal('crawlModal')">&times;</button>
            </div>
            <input type="text" id="subredditInput" placeholder="输入 Subreddit 名称 (如: Entrepreneur)">
            <input type="number" id="limitInput" placeholder="爬取数量" value="50" min="1" max="500">
            <button class="button" onclick="crawlSubreddit()" style="width: 100%;">开始爬取</button>
        </div>
    </div>
    
    <!-- 分析模态框 -->
    <div class="modal" id="analyzeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🤖 AI 分析</h2>
                <button class="close-btn" onclick="hideModal('analyzeModal')">&times;</button>
            </div>
            <textarea id="textInput" placeholder="输入要分析的文本..."></textarea>
            <button class="button" onclick="analyzeText()" style="width: 100%;">分析</button>
            <div id="analysisResult" style="margin-top: 20px; background: #f5f5f5; padding: 15px; border-radius: 6px; display: none;"></div>
        </div>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>商机详情</h2>
                <button class="close-btn" onclick="hideModal('detailModal')">&times;</button>
            </div>
            <div id="detailContent"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="button" onclick="generateSolutions()" style="flex: 1;">生成方案</button>
                <button class="button secondary" onclick="startResearch()" style="flex: 1;">深度研究</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = '/api';
        
        // 页面加载时
        document.addEventListener('DOMContentLoaded', () => {
            loadFindings();
            // 每5分钟刷新一次
            setInterval(loadFindings, 5 * 60 * 1000);
        });
        
        async function loadFindings() {
            try {
                const response = await fetch(`${API_URL}/findings?limit=100`);
                const findings = await response.json();
                
                // 统计
                const stats = {
                    total: findings.length,
                    new: findings.filter(f => f.status === 'new').length,
                    researching: findings.filter(f => f.status === 'researching').length,
                    completed: findings.filter(f => f.status === 'completed').length
                };
                
                document.getElementById('totalFindings').textContent = stats.total;
                document.getElementById('newFindings').textContent = stats.new;
                document.getElementById('researchingFindings').textContent = stats.researching;
                document.getElementById('completedFindings').textContent = stats.completed;
                
                // 显示最近5条
                const html = findings.slice(0, 5).map(f => `
                    <div class="finding-item" onclick="showFindingDetail(${f.id})">
                        <div class="finding-title">💡 ${f.pain_point.substring(0, 50)}...</div>
                        <div class="finding-desc">${f.opportunity.substring(0, 80)}...</div>
                        <span class="status ${f.status}">${f.status}</span>
                    </div>
                `).join('');
                
                document.getElementById('findingsList').innerHTML = html || '<p style="color: #999;">暂无数据</p>';
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('findingsList').innerHTML = '<p style="color: red;">加载失败，请检查连接</p>';
            }
        }
        
        function showModal(id) {
            document.getElementById(id).classList.add('active');
        }
        
        function hideModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        async function crawlSubreddit() {
            const subreddit = document.getElementById('subredditInput').value;
            const limit = document.getElementById('limitInput').value;
            
            if (!subreddit) {
                alert('请输入 Subreddit 名称');
                return;
            }
            
            alert(`将爬取 ${subreddit} 的 ${limit} 条新帖子\n（在后端日志中查看进度）`);
            hideModal('crawlModal');
        }
        
        async function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('请输入文本');
                return;
            }
            
            const resultDiv = document.getElementById('analysisResult');
            resultDiv.innerHTML = '<p>分析中...</p>';
            resultDiv.style.display = 'block';
            
            // 模拟 AI 分析结果
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <strong>分析结果：</strong>
                    <p><strong>痛点：</strong> ${text.substring(0, 100)}</p>
                    <p><strong>商机：</strong> 这可能代表一个市场需求</p>
                    <p><strong>用户类型：</strong> 需要相关工具的专业人士</p>
                `;
            }, 1500);
        }
        
        let currentFindingId = null;
        
        async function showFindingDetail(findingId) {
            currentFindingId = findingId;
            try {
                const response = await fetch(`${API_URL}/findings/${findingId}`);
                const finding = await response.json();
                
                const html = `
                    <h3>痛点</h3>
                    <p>${finding.pain_point}</p>
                    
                    <h3 style="margin-top: 15px;">商机</h3>
                    <p>${finding.opportunity}</p>
                    
                    <h3 style="margin-top: 15px;">目标用户</h3>
                    <p>${finding.target_user || '未设定'}</p>
                    
                    <h3 style="margin-top: 15px;">状态</h3>
                    <p><span class="status ${finding.status}">${finding.status}</span></p>
                    
                    <h3 style="margin-top: 15px;">创建于</h3>
                    <p>${new Date(finding.created_at).toLocaleString('zh-CN')}</p>
                `;
                
                document.getElementById('detailContent').innerHTML = html;
                showModal('detailModal');
            } catch (err) {
                alert('加载失败: ' + err.message);
            }
        }
        
        async function generateSolutions() {
            if (!currentFindingId) return;
            
            try {
                const response = await fetch(`${API_URL}/findings/${currentFindingId}/generate-solutions`, {
                    method: 'POST'
                });
                const data = await response.json();
                alert('✓ 方案已生成！请刷新页面查看');
                hideModal('detailModal');
                loadFindings();
            } catch (err) {
                alert('生成失败: ' + err.message);
            }
        }
        
        function startResearch() {
            alert('深度研究功能启动\n（请在详情页面通过 Chat API 进行多轮交互）');
        }
        
        function viewApiDocs() {
            window.open('/docs', '_blank');
        }
        
        // 点击模态框外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
