# Zeabur 部署配置

services:
  # PostgreSQL 数据库
  - type: postgres
    name: redditminer-db
    version: "15"
    env:
      - POSTGRES_USER=redditminer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=redditminer

  # BusinessMiner 前端服务（静态网站）
  - type: prebuilt
    name: businessminer-frontend
    path: frontend/stitch-designs
    outputDir: .

  # BusinessMiner 后端服务
  - type: python
    name: redditminer-api
    path: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    env:
      - DATABASE_URL=postgresql://redditminer:${POSTGRES_PASSWORD}@redditminer-db:5432/redditminer
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_SECRET=${REDDIT_SECRET}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}
      - DEEPINFRA_MODEL=${DEEPINFRA_MODEL}
      - DEEPINFRA_BASE_URL=https://api.deepinfra.com/v1/openai
