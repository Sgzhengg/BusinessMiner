# Zeabur 部署配置

services:
  # BusinessMiner 前端服务（静态网站）
  - type: prebuilt
    name: businessminer-frontend
    path: frontend/stitch-designs
    outputDir: .

  # BusinessMiner 后端服务（使用 SQLite 数据库）
  - type: python
    name: redditminer-api
    path: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    env:
      - DATABASE_URL=sqlite:///./data/businessminer.db
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_SECRET=${REDDIT_SECRET}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}
      - DEEPINFRA_MODEL=${DEEPINFRA_MODEL}
      - DEEPINFRA_BASE_URL=https://api.deepinfra.com/v1/openai
    volumes:
      - data:/app/data
